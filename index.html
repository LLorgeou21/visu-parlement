<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visu Parlement</title>
<link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>

<header class="site-header">
  <h1>Visu Parlement</h1>
  <p class="soustitre">Suivi quasi temps réel des travaux de l'Assemblée nationale</p>
  <p class="derniere-maj" id="derniere-maj"></p>
  <nav class="onglets">
    <button class="onglet-btn actif" data-onglet="scrutins">Scrutins récents</button>
    <button class="onglet-btn" data-onglet="deputes">Députés</button>
  </nav>
</header>

<main>
  <section id="panneau-scrutins" class="panneau actif">
    <nav class="sous-onglets">
      <button class="sous-onglet-btn actif" data-sous-onglet="chronologique">Chronologique</button>
      <button class="sous-onglet-btn" data-sous-onglet="calendrier">Calendrier</button>
      <button class="sous-onglet-btn" data-sous-onglet="dossier">Par dossier</button>
      <button class="sous-onglet-btn" data-sous-onglet="groupe">Par groupe</button>
    </nav>

    <div id="sous-panneau-chronologique" class="sous-panneau actif">
      <div id="liste-scrutins" class="liste-scrutins"></div>
      <button id="charger-plus" class="btn-secondaire">Charger plus</button>
    </div>

    <div id="sous-panneau-calendrier" class="sous-panneau">
      <div class="calendrier-entete">
        <button id="mois-precedent" class="btn-icone" aria-label="Mois précédent">&larr;</button>
        <span id="calendrier-titre-mois"></span>
        <button id="mois-suivant" class="btn-icone" aria-label="Mois suivant">&rarr;</button>
      </div>
      <div id="grille-calendrier" class="grille-calendrier"></div>
      <div id="liste-jour" class="liste-scrutins"></div>
    </div>

    <div id="sous-panneau-dossier" class="sous-panneau">
      <div id="liste-dossiers" class="liste-dossiers"></div>
    </div>

    <div id="sous-panneau-groupe" class="sous-panneau">
      <select id="selecteur-groupe-votes">
        <option value="">Choisir un groupe...</option>
      </select>
      <div id="liste-votes-groupe" class="liste-scrutins"></div>
    </div>
  </section>

  <section id="panneau-deputes" class="panneau">
    <nav class="sous-onglets">
      <button class="sous-onglet-btn actif" data-sous-onglet="liste-deputes-vue">Liste</button>
      <button class="sous-onglet-btn" data-sous-onglet="hemicycle-vue">Hémicycle</button>
    </nav>

    <div id="sous-panneau-liste-deputes-vue" class="sous-panneau actif">
      <div class="filtres">
        <input id="recherche-depute" type="search" placeholder="Rechercher un député...">
        <select id="filtre-groupe">
          <option value="">Tous les groupes</option>
        </select>
      </div>
      <p id="compteur-deputes" class="compteur"></p>
      <div id="liste-deputes" class="liste-deputes"></div>
    </div>

    <div id="sous-panneau-hemicycle-vue" class="sous-panneau">
      <label class="controle-hemicycle">
        <input type="checkbox" id="taille-absenteisme">
        Taille des sièges proportionnelle à l'absentéisme
      </label>
      <div id="hemicycle" class="hemicycle"></div>
    </div>
  </section>
</main>

<div id="fond-modal" class="fond-modal masque">
  <div class="modal">
    <button id="fermer-modal" class="fermer" aria-label="Fermer">&times;</button>
    <div id="contenu-modal"></div>
  </div>
</div>

<script src="frontend/js/app.js"></script>
</body>
</html>
