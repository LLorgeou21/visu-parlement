name: Collecte scrutins et députés

on:
  schedule:
    - cron: "0 * * * *" # toutes les heures
  workflow_dispatch:

concurrency:
  group: collecte-scrutins

jobs:
  collecte:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collecte des députés
        run: python scripts/collecte_deputes.py

      - name: Collecte des scrutins
        run: python scripts/collecte_scrutins.py

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/permanent data/actuality
          git diff --cached --quiet || git commit -m "Mise à jour automatique : députés et scrutins"
          git pull --rebase
          git push
